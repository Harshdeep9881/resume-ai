<!DOCTYPE html>
<html>
<head>
    <title>Application Submitted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    {% load static %}
    <link href="{% static 'core/style.css' %}" rel="stylesheet">
</head>
<body class="app-body">
<div class="container app-shell">
    <div class="hero-card text-center">
        <div class="stat-pill mb-3">Submitted</div>
        <h2 class="hero-title mb-2">Application received</h2>
        <p class="muted-text mb-4">Thanks for applying to <strong>{{ job.title }}</strong>. The hiring team will review your profile and evidence.</p>
        <a href="{% url 'candidate_apply' job.id %}" class="btn btn-outline-dark">Submit another response</a>
    </div>
</div>
</body>
</html>
